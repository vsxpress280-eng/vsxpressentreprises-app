<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pas de connexion - VS XPRESS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0B0B0B;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        /* Gold Gradient Text */
        .gold-text {
            background: linear-gradient(135deg, #D4AF37 0%, #F2D06B 50%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Icon Container with Pulse */
        .icon-container {
            width: 120px;
            height: 120px;
            background: rgba(26, 26, 26, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            opacity: 0;
            animation: pulse 2s infinite;
        }

        .wifi-icon {
            width: 64px;
            height: 64px;
            fill: none;
            stroke: #666;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            position: relative;
        }

        .wifi-slash {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #D4AF37;
            top: 50%;
            left: 0;
            transform: rotate(-45deg);
        }

        /* Typography */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: #888;
            font-size: 16px;
            line-height: 1.5;
            max-width: 300px;
            margin-bottom: 40px;
        }

        /* Button */
        .retry-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #B4941F 100%);
            border: none;
            border-radius: 12px;
            padding: 16px 48px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }

        .retry-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        /* Animations */
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Status Badge */
        .status-badge {
            position: fixed;
            bottom: 20px;
            background: #1A1A1A;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="icon-container fade-in">
        <svg class="wifi-icon" viewBox="0 0 24 24">
            <path d="M1 1l22 22"></path>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a16 16 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
    </div>

    <h1 class="gold-text fade-in" style="animation-delay: 0.1s">Connexion perdue</h1>
    
    <p class="fade-in" style="animation-delay: 0.2s">
        Impossible de se connecter au serveur.<br>
        Vérifiez votre connexion internet.
    </p>

    <button id="retryButton" class="retry-btn fade-in" style="animation-delay: 0.3s">
        Réessayer
    </button>

    <div class="status-badge fade-in" style="animation-delay: 0.4s">
        <span class="status-dot"></span>
        Mode hors ligne
    </div>

    <script>
        const retryBtn = document.getElementById('retryButton');
        
        function checkConnection() {
            if (navigator.onLine) {
                // Try to reload the page or go back
                window.location.reload();
            } else {
                // Visual feedback for failed check
                retryBtn.style.transform = 'scale(0.95)';
                setTimeout(() => retryBtn.style.transform = 'scale(1)', 150);
            }
        }

        retryBtn.addEventListener('click', checkConnection);

        // Auto-detect when online comes back
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
